<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day-Stream Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Day-Stream Tracker</h1>
            <p class="subtitle">Visualize your time. Master your week.</p>
        </header>

        <div class="week-navigation">
            <button onclick="changeWeek(-1)" class="nav-btn">
                <i data-lucide="chevron-left"></i>
            </button>
            <div class="week-display" id="weekDisplay"></div>
            <button onclick="changeWeek(1)" class="nav-btn">
                <i data-lucide="chevron-right"></i>
            </button>
        </div>

        <!-- Category Manager Modal -->
        <div id="categoryModal" class="modal">
            <div class="modal-content glass-panel">
                <div class="modal-header">
                    <h3>Manage Categories</h3>
                    <button onclick="closeCategoryModal()" class="close-btn">
                        <i data-lucide="x"></i>
                    </button>
                </div>
                
                <div id="categoryList" class="category-list"></div>
                
                <form id="categoryForm" class="category-form">
                    <div class="form-row">
                        <input type="text" id="newCatName" placeholder="Category Name" required>
                        <input type="color" id="newCatColor" value="#FF6B6B" title="Choose color">
                    </div>
                    
                    <div class="emoji-section">
                        <label>Choose Icon</label>
                        <div class="emoji-picker" id="emojiPicker"></div>
                        <input type="hidden" id="selectedEmoji">
                    </div>
                    
                    <button type="submit" class="btn-primary">
                        <i data-lucide="plus"></i> Add Category
                    </button>
                </form>
            </div>
        </div>

        <!-- Edit Task Modal -->
        <div id="editModal" class="modal">
            <div class="modal-content glass-panel">
                <div class="modal-header">
                    <h3>Edit Activity</h3>
                    <button onclick="closeEditModal()" class="close-btn">
                        <i data-lucide="x"></i>
                    </button>
                </div>
                <form id="editForm">
                    <input type="hidden" id="editTaskId">
                    
                    <div class="form-group">
                        <label>Activity Name</label>
                        <input type="text" id="editTaskName" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Day</label>
                            <select id="editDaySelect" required>
                                <option value="0">Monday</option>
                                <option value="1">Tuesday</option>
                                <option value="2">Wednesday</option>
                                <option value="3">Thursday</option>
                                <option value="4">Friday</option>
                                <option value="5">Saturday</option>
                                <option value="6">Sunday</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select id="editCategorySelect" required></select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Start Time</label>
                            <input type="time" id="editStartTime" required>
                        </div>
                        <div class="form-group">
                            <label>End Time</label>
                            <input type="time" id="editEndTime" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Details (Optional)</label>
                        <textarea id="editTaskDetails" rows="3" placeholder="Add notes, location, etc..."></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="button" onclick="deleteCurrentTask()" class="btn-danger">
                            <i data-lucide="trash-2"></i> Delete
                        </button>
                        <button type="submit" class="btn-primary">
                            <i data-lucide="save"></i> Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="main-layout">
            <div class="input-panel glass-panel">
                <h2><i data-lucide="plus-circle"></i> Log Activity</h2>
                
                <button onclick="openCategoryModal()" class="btn-secondary" style="margin-bottom: 20px;">
                    <i data-lucide="settings"></i> Manage Categories
                </button>

                <form id="taskForm">
                    <div class="form-group">
                        <label for="taskName">Activity Name</label>
                        <input type="text" id="taskName" placeholder="e.g., Morning Gym" required>
                    </div>

                    <div class="form-group">
                        <label>Select Day</label>
                        <select id="daySelect" required>
                            <option value="0">Monday</option>
                            <option value="1">Tuesday</option>
                            <option value="2">Wednesday</option>
                            <option value="3">Thursday</option>
                            <option value="4">Friday</option>
                            <option value="5">Saturday</option>
                            <option value="6">Sunday</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Start Time</label>
                            <input type="time" id="startTime" required>
                        </div>
                        <div class="form-group">
                            <label>End Time</label>
                            <input type="time" id="endTime" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Category</label>
                        <div id="dynamicCategorySelect" class="category-select">
                            <!-- Populated by JS -->
                        </div>
                        <input type="hidden" id="selectedCategory" required>
                    </div>

                    <div class="form-group">
                        <label for="taskDetails">Details (Optional)</label>
                        <textarea id="taskDetails" rows="2" placeholder="Add notes, location, etc..."></textarea>
                    </div>

                    <button type="submit" class="btn-primary" id="submitBtn">
                        <i data-lucide="plus"></i> Add to Timeline
                    </button>
                    <button type="button" onclick="cancelEdit()" id="cancelBtn" class="btn-secondary" style="display:none;">
                        <i data-lucide="x"></i> Cancel Edit
                    </button>
                </form>
            </div>

            <div class="dashboard glass-panel">
                <div class="dashboard-header">
                    <h2><i data-lucide="calendar"></i> Weekly Roadmap</h2>
                    <div id="legendContainer" class="legend">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div class="timeline-container" id="timelineContainer">
                    <div class="time-header" id="timeHeader"></div>
                    <div class="days-container" id="daysContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="tooltip" id="tooltip">
        <div class="tooltip-header">
            <span class="tooltip-icon" id="tooltipIcon"></span>
            <div class="tooltip-title" id="tooltipTitle"></div>
        </div>
        <div class="tooltip-time" id="tooltipTime"></div>
        <div class="tooltip-details" id="tooltipDetails"></div>
        <div class="tooltip-category" id="tooltipCategory"></div>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
